version = 1

# Almost all files within Core/ and Drivers/STM32F1xx_HAL_Driver/ are generated by STM32CubeMX
[[annotations]]
path = [
    "firmware/Core/**",
    "firmware/Drivers/STM32F1xx_HAL_Driver/**",
    "firmware/STM32F103**",
    "firmware/startup**",
    "firmware/cmake/stm32cubemx/CMakeLists.txt",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "2016-2025 STMicroelectronics"
SPDX-License-Identifier = "BSD-3-Clause"

# All files within Middlewares/Third_Party/FreeRTOS/ are generated by STM32CubeMX
[[annotations]]
path = "firmware/Middlewares/Third_Party/FreeRTOS/**"
precedence = "aggregate"
SPDX-FileCopyrightText = "2020 Amazon.com, Inc. or its affiliates.  All Rights Reserved."
SPDX-License-Identifier = "MIT"

# All files within Middlewares/Third_Party/FreeRTOS/ are generated by STM32CubeMX
[[annotations]]
path = "firmware/Middlewares/Third_Party/FreeRTOS/Source/CMSIS_RTOS/**"
precedence = "aggregate"
SPDX-FileCopyrightText = "2016 STMicroelectronics"
SPDX-License-Identifier = "MIT"

# PCB files are CERN Open Hardware Permissive licensed
[[annotations]]
path = "pcb/**"
precedence = "aggregate"
SPDX-FileCopyrightText = "2025 Gilles Henrard <contact@gilleshenrard.com>"
SPDX-License-Identifier = "CERN-OHL-P-2.0"

# GrabCAD and Wago do not come with an explicit license and are therefore to be considered as restricted
[[annotations]]
path = ["pcb/3d-models/grabcad/**"]
SPDX-FileComment = "License not explicitly provided"
SPDX-FileCopyrightText = "GrabCAD uploader"
precedence = "aggregate"

# Wago components are provided by UltraLibrarian, and are proprietary
[[annotations]]
path = ["pcb/3d-models/wago/**"]
SPDX-FileComment = "Explicit proprietary license"
SPDX-FileCopyrightText = "2017 EMA Design Automation, Inc.  All Rights Reserved."
precedence = "aggregate"


# PCB files are CERN Open Hardware Permissive licensed
[[annotations]]
path = "pcb/leany_footprints.pretty/**"
precedence = "aggregate"
SPDX-FileCopyrightText = "2025 KiCAD"
SPDX-License-Identifier = "CC-BY-SA-4.0"
