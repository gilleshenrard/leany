version = 1

# Almost all files within Core/ are generated by STM32CubeMX
[[annotations]]
path = "firmware/Core/**"
precedence = "aggregate"
SPDX-FileCopyrightText = "2024 STMicroelectronics"
#SPDX-License-Identifier = "CC0-1.0"

# All files within Drivers/STM32F1xx_HAL_Driver/ are generated by STM32CubeMX
[[annotations]]
path = "firmware/Drivers/STM32F1xx_HAL_Driver/**"
precedence = "aggregate"
SPDX-FileCopyrightText = "2019 STMicroelectronics"
SPDX-License-Identifier = "BSD-3-Clause"

# All files within Middlewares/Third_Party/FreeRTOS/ are generated by STM32CubeMX
[[annotations]]
path = "firmware/Middlewares/Third_Party/FreeRTOS/**"
precedence = "aggregate"
#SPDX-FileCopyrightText = "2019 STMicroelectronics"
SPDX-License-Identifier = "MIT"
